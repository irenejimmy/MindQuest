<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindQuest Dashboard</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='dashboard.css') }}">
</head>
<body>

<!-- Navigation -->
<nav>

    <div class="logo">
        🧠 MindQuest
    </div>

    <div class="nav-right">
        <a href="/profile">👤 My Profile</a>
        <a href="/">🚪 Logout</a>
    </div>

</nav>

<!-- Main Content -->
<div class="container">

    <h1>Welcome Back, Irene 👋</h1>

    <p>Tell me how you're feeling today.</p>

    <form action="/detect" method="POST">

        <textarea
            name="message"
            placeholder="Write what's on your mind..."
            required>
        </textarea>

        <br><br>

        <button type="submit">
            🎮 Start Mood Adventure
        </button>

    </form>

</div>

</body>
</html>
