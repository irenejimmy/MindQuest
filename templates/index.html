<!DOCTYPE html>
<html>
<head>
    <title>Mental Health Chat Assistant</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <h1>AI Mental Health Chat Assistant</h1>

    <form method="POST">
        <textarea name="message" rows="5" cols="50"
        placeholder="How are you feeling today?"></textarea>
        <br><br>

        <button type="submit">Analyze Mood</button>
    </form>

    {% if mood %}
        <h2>Detected Mood: {{ mood }}</h2>
        <p>{{ suggestion }}</p>
    {% endif %}

</body>
</html>
